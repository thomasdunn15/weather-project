<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>weather · kalshi trading desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css?v=1">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="glyph"></span>
      <span class="name">WEATHER · KALSHI</span>
      <span class="sub">trading desk</span>
    </div>
    <span class="env-badge live" id="env-badge">LIVE</span>
    <span class="spacer"></span>
    <span class="clock" id="clock"><span class="utc"></span></span>
    <span class="refresh-pill"><span class="dot live"></span><span id="refresh-label">live · 15s</span></span>
  </header>

  <nav class="tabbar">
    <button id="tab-live" class="on" onclick="switchTab('live')">Live Trading</button>
    <button id="tab-backtest" onclick="switchTab('backtest')">Backtest</button>
  </nav>

  <main>
    <section id="section-live">
      <div class="wrap" id="live-root"><div class="loading">Loading live data…</div></div>
    </section>
    <section id="section-backtest" hidden>
      <div id="backtest-root"><div class="wrap"><div class="loading">Loading backtest…</div></div></div>
    </section>
  </main>
</div>
<script src="/static/app.js?v=1"></script>
</body>
</html>
